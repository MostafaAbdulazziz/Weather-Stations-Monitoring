apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station-1
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-station-1
  template:
    metadata:
      labels:
        app: weather-station-1
    spec:
      containers:
        - name: weather-station
          image: weather-station:latest
          imagePullPolicy: Never
          env:
            - name: STATION_ID
              value: "1"
            - name: KAFKA_BOOTSTRAP
              value: "kafka:9092"
---
