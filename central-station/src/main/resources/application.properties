# Server port
server.port=8080

# Suppress noisy Hadoop/Avro/Parquet loggers
logging.level.org.apache.hadoop=ERROR
logging.level.org.apache.parquet=ERROR
logging.level.org.apache.avro=ERROR
logging.level.org.apache.kafka=WARN
logging.level.com.weather=INFO

# Kafka Streams / Rain Detector logging
logging.level.org.apache.kafka.streams=INFO
logging.level.com.weather.central.consumer.RainDetector=DEBUG
